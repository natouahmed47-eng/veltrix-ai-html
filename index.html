<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="hero">
        <section class="hero__card">
            <p class="hero__eyebrow">AI-powered ideas</p>
            <h1>Veltrix AI</h1>
            <p class="hero__message">
                Welcome to Veltrix AI, a simple modern space for smart ideas, clean design, and future-ready digital experiences.
            </p>

            <div class="hero__controls">
                <label class="hero__label" for="productInput">Product or idea</label>
                <div class="hero__actions">
                    <input
                        class="hero__input"
                        id="productInput"
                        type="text"
                        placeholder="Type your product or startup idea"
                    >
                    <button class="hero__button" id="analyzeButton" type="button">Analyze</button>
                </div>
            </div>

            <section class="result-card" aria-live="polite">
                <p class="result-card__label">AI result</p>
                <p class="hero__response" id="welcomeResponse">Your optimized product description will appear here.</p>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
