<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veltrix AI — Product Intelligence Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
</head>
<body>

    <div class="top-bar">
        <div class="logo">Veltrix<span>AI</span></div>
        <div class="tagline">Product Intelligence Platform</div>

        <div class="auth-area" id="authArea">
            <button class="btn-login" id="showLoginBtn">Log In</button>
            <button class="btn-signup" id="showRegisterBtn">Sign Up</button>
        </div>

        <div class="user-area" id="userArea">
            <span class="usage-info" id="usageInfo"></span>
            <a class="dashboard-link" href="/dashboard">Dashboard</a>
            <span class="username-display" id="usernameDisplay"></span>
            <button class="btn-logout" id="logoutBtn">Log Out</button>
        </div>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-box">
            <button class="modal-close" id="closeAuthModal">&times;</button>
            <h2 class="modal-title" id="authModalTitle"></h2>

            <div class="form-group">
                <label class="form-label" for="authUsername">Username</label>
                <input class="form-input" type="text" id="authUsername" />
            </div>

            <div class="form-group">
                <label class="form-label" for="authPassword">Password</label>
                <input class="form-input" type="password" id="authPassword" />
            </div>

            <div class="auth-error" id="authError"></div>
            <button class="btn-auth-submit" id="authSubmitBtn">Submit</button>
            <div class="auth-switch" id="authSwitch"></div>
        </div>
    </div>

    <div class="container">
        <div class="search-card">
            <h1>Analyze Any Product</h1>
            <div class="muted">
                Enter a product name or idea to generate a full AI-powered intelligence report.
            </div>

            <div class="search-row">
                <input
                    type="text"
                    id="productIdea"
                    placeholder="e.g. iPhone 15, Nike Air Max, CeraVe Moisturizer, IKEA Kallax..."
                />
                <button id="analyzeBtn">Analyze</button>
            </div>

            <div id="message"></div>
        </div>

        <div id="results"></div>

        <div id="paypal-button-container"></div>
    </div>

    <script>AUjIzE4NDhyJW5Zl_VX_sSD0wKMpJ78VluGk2NOy6M5uXglD_fSZxqjOcNDycA2-yZ5e_XiLqoGAcxjA 
</body>
</html>
